---
name: Example 1
on:
  push:
    branches: [ main ]
jobs:
  build:
    name: Build-job
    runs-on: self-hosted
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: MySQLQuery
      env:
        PASS: ${{ secret.MYSQL_PASS }}
      run: |
        docker run -v ${GITHUB_WORKSPACE}:/var/lib/docker --rm mysql:5.6 sh -C "mysql -u root -p$PASS  -hmysql.mysql.svc.cluster.local </var/lib/docker/test.sql"